name: Continuous Integration

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

env:
  MAVEN_OPTS: -Dmaven.wagon.httpconnectionManager.ttlSeconds=25 -Dmaven.wagon.http.retryHandler.count=3
  BASE_JAVA_VERSION: 17
  DEFAULT_JAVA_DISTRIBUTION: 'temurin'
# Least privilege: all jobs only read the repo and build with Maven. Nexus
# deploy credentials come from secrets, not GITHUB_TOKEN, so no write scope is
# needed. Deny everything the default token would otherwise grant.
permissions:
  contents: read
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        java: [ 17, 21, 25 ]
    name: "Java ${{ matrix.java }}"
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Cache Maven Repository
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.m2/repository
        key: maven-java-${{ matrix.java }}-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          maven-java-${{ matrix.java }}-
          maven-
    - name: Set up Java
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        java-version: ${{ matrix.java }}
        distribution: ${{ env.DEFAULT_JAVA_DISTRIBUTION }}
    - name: Build
      run: mvn -B -e -Papache-release -Dgpg.skip=true -Dmaven.compiler.release=${{ matrix.java }} verify
    - name: Remove Snapshots
      run: |
        set -o pipefail
        find ~/.m2/repository -name '*-SNAPSHOT' -a -type d -print0 | xargs -0 -r rm -rf
  site:
    name: Site
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Cache Maven Repository
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.m2/repository
        key: maven-site-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          maven-site-
          maven-
    - name: Set up Java
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        java-version: ${{ env.BASE_JAVA_VERSION }}
        distribution: ${{ env.DEFAULT_JAVA_DISTRIBUTION }}
    - name: Build
      run: mvn -B -e -Dmaven.test.skip=true -Dmaven.compiler.release=${{ env.BASE_JAVA_VERSION }} package site-deploy
    - name: Remove Snapshots
      run: |
        set -o pipefail
        find ~/.m2/repository -name '*-SNAPSHOT' -a -type d -print0 | xargs -0 -r rm -rf
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && github.repository == 'apache/axis-axis2-java-core'
    name: Deploy
    runs-on: ubuntu-24.04
    needs:
      - build
      - site
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Cache Maven Repository
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.m2/repository
        key: maven-deploy-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          maven-deploy-
          maven-
    - name: Set up Java
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        java-version: ${{ env.BASE_JAVA_VERSION }}
        distribution: ${{ env.DEFAULT_JAVA_DISTRIBUTION }}
        server-id: apache.snapshots.https
        server-username: NEXUS_USER
        server-password: NEXUS_PW
    - name: Deploy
      run: mvn -B -e -Papache-release -Dgpg.skip=true -Dmaven.test.skip=true -Dmaven.compiler.release=${{ env.BASE_JAVA_VERSION }} deploy
      env:
        NEXUS_USER: ${{ secrets.NEXUS_USER }}
        NEXUS_PW: ${{ secrets.NEXUS_PW }}
    - name: Remove Snapshots
      run: |
        set -o pipefail
        find ~/.m2/repository -name '*-SNAPSHOT' -a -type d -print0 | xargs -0 -r rm -rf
